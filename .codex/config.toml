#:schema https://developers.openai.com/codex/config-schema.json

# Default model for the project (roles can override if needed)
model = "gpt-5.3-codex"
model_reasoning_effort = "high"

[features]
multi_agent = true

[agents]
max_threads = 6
max_depth = 1

[agents.planner]
description = "Receives the user request, clarifies constraints, and produces an executable plan + task breakdown + acceptance criteria."
config_file = "agents/planner.toml"

[agents.dev_a]
description = "Developer A: core implementation owner. Minimal focused patches."
config_file = "agents/dev_a.toml"

[agents.dev_b]
description = "Developer B: pair dev. Tests, edge cases, integration, small refactors."
config_file = "agents/dev_b.toml"

[agents.reviewer]
description = "Reviews dev outputs against the locked plan + acceptance criteria; produces a punch-list."
config_file = "agents/reviewer.toml"