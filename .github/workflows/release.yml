# Release workflow - triggered on tag push
# Builds Linux binary and creates GitHub Release
name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on tags like v1.0.0, v0.1.0, etc.

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # fix permission to create release

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.2'

    - name: Run tests
      run: go test -v ./...

    - name: Build Linux amd64 (static, glibc-independent)
      run: |
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
          -trimpath \
          -ldflags "-s -w -X github.com/BlackMetalz/holyf-network/cmd.Version=${{ github.ref_name }}" \
          -o holyf-network-linux-amd64 .

    - name: Verify Linux binary type
      run: |
        file holyf-network-linux-amd64

    - name: Smoke test on Ubuntu 20.04
      run: |
        docker run --rm -v "${PWD}:/w" -w /w ubuntu:20.04 ./holyf-network-linux-amd64 --version

    - name: Smoke test on CentOS 7
      run: |
        docker run --rm -v "${PWD}:/w" -w /w centos:7 ./holyf-network-linux-amd64 --version

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          holyf-network-linux-amd64
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
